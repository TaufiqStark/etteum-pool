services:
  postgres:
    image: postgres:15
    container_name: poolprox-postgres
    environment:
      POSTGRES_DB: pool_proxy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  poolprox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: poolprox-app
    ports:
      - "1630:1630"
      - "1631:1631"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/pool_proxy
      PORT: 1630
      DASHBOARD_PORT: 1631
      API_KEY: ${API_KEY:-pool-proxy-secret-key}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      AUTH_SCRIPT_PATH: /app/scripts/auth/login.py
      PYTHON_PATH: /app/scripts/auth/.venv/bin/python
      AUTH_SCRIPT_CWD: /app/scripts/auth
      BROWSER_ENGINE: ${BROWSER_ENGINE:-camoufox}
      HEADLESS: ${HEADLESS:-true}
      CAPTCHA_SERVICE: ${CAPTCHA_SERVICE:-none}
      CAPTCHA_API_KEY: ${CAPTCHA_API_KEY:-}
      KIRO_PRO_UPGRADE: ${KIRO_PRO_UPGRADE:-false}
      WINDSURF_API_PORT: ${WINDSURF_API_PORT:-3003}
      WINDSURF_API_KEY: ${WINDSURF_API_KEY:-poolprox2-windsurf-internal}
      PROXY_URL: ${PROXY_URL:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1630/api/info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - camoufox_cache:/root/.cache/camoufox
    restart: unless-stopped
    stop_grace_period: 10s

volumes:
  postgres_data:
  camoufox_cache: